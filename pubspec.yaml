name: dialer_app
description: Full-featured default dialer app with PIN call protection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Contacts
  flutter_contacts: ^1.1.9+2
  # Call log history
  call_log: ^4.0.0
  # Permissions
  permission_handler: ^11.3.1
  # State management
  provider: ^6.1.2
  # PIN storage
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  # URL launcher (tel: scheme)
  url_launcher: ^6.2.6
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
